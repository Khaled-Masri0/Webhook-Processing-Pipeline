services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d webhook_pipeline"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/webhook_pipeline?schema=public
      PORT: 3000
      WORKER_POLL_MS: 5000
    ports:
      - "3000:3000"
    command:
      [
        "sh",
        "-c",
        "until npm run prisma:deploy; do echo 'Waiting for database migrations...' && sleep 2; done && node dist/api/index.js",
      ]

  worker:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/webhook_pipeline?schema=public
      PORT: 3000
      WORKER_POLL_MS: 5000
    command:
      [
        "sh",
        "-c",
        "until npm run prisma:deploy; do echo 'Waiting for database migrations...' && sleep 2; done && node dist/worker/index.js",
      ]

volumes:
  postgres_data:
